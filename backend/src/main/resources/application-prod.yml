spring:
  datasource:
    hikari:
      # AWS 프리티어(t2.micro)의 제한된 메모리를 고려하여 최소화
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
  
  jpa:
    hibernate:
      # 운영 환경에서는 update 대신 validate를 권장하지만, 초기 배포 편의성을 위해 update 유지
      ddl-auto: update
    show-sql: false
  
  config:
    activate:
      on-profile: prod

app:
  # CloudFront 도메인이 확정되면 해당 URL로 교체 필요
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: WARN
    com.daypoo: INFO
